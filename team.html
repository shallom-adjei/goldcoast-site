<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leadership Team – Gold Coast Capital</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a12; font-family: 'Inter', sans-serif; overflow-x: hidden; }
    .glass-premium {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,215,120,0.10);
      border-radius: 1.25rem;
    }
    .text-gradient {
      background: linear-gradient(135deg, #FFD11A, #D4A017, #B8860B);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .carousel-track {
      display: flex;
      gap: 1.5rem;
      width: max-content;
      animation: scrollLoop 50s linear infinite;
    }
    @keyframes scrollLoop {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    .carousel-wrapper {
      overflow: hidden;
      position: relative;
    }
    .carousel-wrapper::before,
    .carousel-wrapper::after {
      content: "";
      position: absolute;
      top: 0; bottom: 0;
      width: 80px;
      z-index: 2;
      pointer-events: none;
    }
    .carousel-wrapper::before {
      left: 0;
      background: linear-gradient(to right, #0a0a12, transparent);
    }
    .carousel-wrapper::after {
      right: 0;
      background: linear-gradient(to left, #0a0a12, transparent);
    }
    /* Pause on hover */
    .carousel-wrapper:hover .carousel-track {
      animation-play-state: paused;
    }
  </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center px-4 py-16">
  <div class="max-w-7xl w-full">
    <div class="text-center mb-16">
      <h1 class="text-4xl sm:text-5xl font-extrabold text-gradient mb-3">Meet Our Leadership Team</h1>
      <p class="text-gray-400 text-sm max-w-2xl mx-auto">
        A diverse group of seasoned professionals guiding Gold Coast Capital’s vision, operations, and commitment to your financial growth.
      </p>
    </div>

    <div class="carousel-wrapper">
      <div class="carousel-track" id="carouselTrack">
        <!-- The track will be duplicated via JS to create seamless loop -->
      </div>
    </div>

    <p class="text-center text-gray-500 text-xs mt-16">
      © 2026 Gold Coast Capital. All rights reserved.
    </p>
  </div>

  <script>

      },
      {
        name: "Akosua Mensah",
        role: "Head of Member Support",
        img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200&h=200&fit=crop&crop=face",

      },
      {

        role: "Technology & Security Director",
        img: "https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=200&h=200&fit=crop&crop=face",
        bio: "Yaw is responsible for the platform’s entire technical infrastructure and cybersecurity posture. With over 12 years in software engineering and network security, he ensures that every byte of data and every cedi of value is protected by enterprise-grade encryption and monitoring. Under his watch, the platform has maintained an unblemished security record."
      },
      {
        name: "Efua Danso",
        role: "Investment Strategy Advisor",
        img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200&h=200&fit=crop&crop=face",
        bio: "Efua designs the strategic frameworks behind our investment plans, bonus structures, and reinvestment incentives. Holding an MBA in Finance and a deep understanding of behavioral economics, she crafts policies that balance generous returns with long‑term platform stability. Her work ensures that every plan you choose is both rewarding and sustainable."
      },
      {

        img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200&h=200&fit=crop&crop=face",
        bio: "Kofi is the heartbeat of our Telegram community. He curates daily content, manages our Lucky Spin and Mystery Box events, and celebrates every member’s milestones. With a degree in Communications and a natural gift for bringing people together, he turns a simple chat group into a vibrant, supportive community of investors."

      {

      {

        role: "Client Relations Director",

    const track = document.getElementById('carouselTrack');

    function renderTeam() {
      const cards = team.map(member => `
        <div class="glass-premium p-6 text-center" style="min-width: 280px; max-width: 320px; flex-shrink: 0;">
          <img src="${member.img}" alt="${member.name}" class="w-20 h-20 rounded-full mx-auto mb-4 object-cover border-2 border-gold-400/30">
          <h3 class="text-lg font-bold">${member.name}</h3>
          <p class="text-gold-400 text-xs font-semibold mb-3">${member.role}</p>
          <p class="text-gray-400 text-[11px] leading-relaxed">${member.bio}</p>
        </div>
      `).join('');

      // Duplicate the cards to create seamless loop
      track.innerHTML = cards + cards;
    }

    renderTeam();
  </script>
</body>
</html>
